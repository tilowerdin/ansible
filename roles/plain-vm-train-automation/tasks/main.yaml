- name: Create data directory
  become_user: "{{ created_user.name }}"
  become: true
  ansible.builtin.file:
    path: "{{ created_user.home }}/data"
    state: directory
    owner: "{{ created_user.name }}"
    mode: '0755'

#- name: Deploy strategies
#  include_role:
#    name: deploy-strategies
#  vars:
#    username: "{{ created_user.name }}"
#    data_dir: "{{ created_user.home }}/data"

- name: Login to github
  include_role:
    name: github-docker-login
  vars:
    docker_user: "{{ created_user.name }}"

- name: Stop container if running
  become_user: "{{ created_user.name }}"
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ created_user.home }}"
    state: stopped

- name: Start docker container
  become_user: "{{ created_user.name }}"
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ created_user.home }}"
