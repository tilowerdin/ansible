- name: Create user vm-train-automation
  ansible.builtin.user:
    name: vm-train-automation
    create_home: true
    shell: /bin/bash
    groups: docker
    append: true
  register: created_user

- name: Copy docker compose
  become_user: "{{ created_user.name }}"
  become: true
  template:
    src: docker-compose.yaml.j2
    dest: "{{ created_user.home }}/docker-compose.yaml"
    owner: "{{ created_user.name }}"
    mode: '0644'
  vars:
    docker_user: "{{ created_user.uid }}"

- name: Check if data directory already exists
  become_user: "{{ created_user.name }}"
  become: true
  ansible.builtin.stat:
    path: "{{ created_user.home }}/data"
  register: data_dir_stat

